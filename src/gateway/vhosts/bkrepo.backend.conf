	# 网关层路由转发
	location  ~ /(api/|)([\w-_]+)/(.*) {
		set $service $2;
		set $path $3;
		set $target '';

		access_by_lua_file 'conf/lua/router_srv.lua';

		proxy_set_header HOST $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

		# 安全加固：本 location 无 auth_request 鉴权，强制覆盖 API-TYPE 防止外部伪造 "web" 绕过应用层 fallback
		proxy_set_header X-BKREPO-API-TYPE "api";

		proxy_http_version 1.1;

		# 禁止从网关访问/actuator/health
		if ($request_uri ~*  ^/(api/|)([\w-_]+)/actuator/health$) {
            return 403;
        }

		# 禁止从网关访问/actuator/env
		if ($request_uri ~*  ^/(api/|)([\w-_]+)/actuator/env) {
            return 403;
        }

		# 反向代理到目标ip，端口，路径和参数
		if ($request_uri ~* ^/(api/|)([\w-_]+)/(.*)$) {
			proxy_pass http://$target/$3;
		}
	}
