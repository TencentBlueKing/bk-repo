{{- if .Values.skill.enabled -}}
kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ include "common.names.fullname" . }}-skill
  labels: {{- include "common.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: skill
    {{- if .Values.commonLabels }}
      {{- include "common.tplvalues.render" (dict "value" .Values.commonLabels "context" $) | nindent 4 }}
    {{- end }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" (dict "value" .Values.commonAnnotations "context" $) | nindent 4 }}
  {{- end }}
data:
  application.yml: |-
    {{- if keys $.Values.skill.config }}
    {{- toYaml .Values.skill.config | nindent 4 }}
    {{- end}}
    skill:
      domain: {{ .Values.bkDomainScheme }}://{{ .Values.gateway.host }}/skill
{{- end }}
