{{- if .Values.skill.enabled -}}
apiVersion: {{ include "common.capabilities.deployment.apiVersion" . }}
kind: Deployment
metadata:
  name: {{ include "common.names.fullname" . }}-skill
  labels: {{- include "common.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: skill
    {{ include "bkrepo.labelValues.scope" . }}: {{ include "bkrepo.labelValues.scope.backend" . }}
    {{- if .Values.commonLabels }}
    {{- include "common.tplvalues.render" (dict "value" .Values.commonLabels "context" $) | nindent 4 }}
    {{- end }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" (dict "value" .Values.commonAnnotations "context" $) | nindent 4 }}
  {{- end }}
spec:
  selector:
    matchLabels: {{- include "common.labels.matchLabels" . | nindent 6 }}
      app.kubernetes.io/component: skill
  replicas: {{ default 1 .Values.skill.replicaCount }}
  template:
    metadata:
      labels: {{- include "common.labels.standard" . | nindent 8 }}
        app.kubernetes.io/component: skill
        {{ include "bkrepo.labelValues.scope" . }}: {{ include "bkrepo.labelValues.scope.backend" . }}
        {{- if .Values.skill.podLabels }}
        {{- include "common.tplvalues.render" (dict "value" .Values.skill.podLabels "context" $) | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ template "bkrepo.serviceAccountName" . }}
      {{- include "bkrepo.imagePullSecrets" . | nindent 6 }}
      {{- if .Values.skill.hostAliases }}
      hostAliases: {{- include "common.tplvalues.render" (dict "value" .Values.skill.hostAliases "context" $) | nindent 8 }}
      {{- end }}
      {{- if .Values.skill.affinity }}
      affinity: {{- include "common.tplvalues.render" ( dict "value" .Values.skill.affinity "context" $) | nindent 8 }}
      {{- else }}
      affinity:
        {{- if eq .Values.persistence.accessMode "ReadWriteOnce" }}
        podAffinity: {{- include "common.affinities.pods" (dict "type" "soft" "component" "repository" "context" $) | nindent 10 }}
        {{- else }}
        podAffinity: {{- include "common.affinities.pods" (dict "type" .Values.repository.podAffinityPreset "component" "skill" "context" $) | nindent 10 }}
        {{- end }}
        podAntiAffinity: {{- include "common.affinities.pods" (dict "type" .Values.skill.podAntiAffinityPreset "component" "skill" "context" $) | nindent 10 }}
        nodeAffinity: {{- include "common.affinities.nodes" (dict "type" .Values.skill.nodeAffinityPreset.type "key" .Values.skill.nodeAffinityPreset.key "values" .Values.skill.nodeAffinityPreset.values) | nindent 10 }}
      {{- end }}
      {{- if .Values.skill.nodeSelector }}
      nodeSelector: {{- include "common.tplvalues.render" ( dict "value" .Values.skill.nodeSelector "context" $) | nindent 8 }}
      {{- end }}
      {{- if .Values.skill.tolerations }}
      tolerations: {{- include "common.tplvalues.render" (dict "value" .Values.skill.tolerations "context" .) | nindent 8 }}
      {{- end }}
      {{- if .Values.skill.priorityClassName }}
      priorityClassName: {{ .Values.skill.priorityClassName | quote }}
      {{- end }}
      {{- if .Values.skill.podSecurityContext.enabled }}
      securityContext: {{- omit .Values.skill.podSecurityContext "enabled" | toYaml | nindent 8 }}
      {{- end }}
      containers:
        - name: skill
          image: {{ include "bkrepo.images.image" ( dict "imageRoot" .Values.skill.image "global" .Values.global "bkrepo" .Values.common) }}
          imagePullPolicy: {{ .Values.skill.image.pullPolicy }}
          {{- if .Values.skill.containerSecurityContext.enabled }}
          securityContext: {{- omit .Values.skill.containerSecurityContext "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.skill.resources }}
          resources: {{- toYaml .Values.skill.resources | nindent 12 }}
          {{- end }}
          env:
            - name: BK_REPO_JVM_OPTION
              value: {{ .Values.common.jvmOption }}
            - name: BK_REPO_PROFILE
              value: {{ .Values.common.springProfile }}
            - name: BK_REPO_SERVICE_PREFIX
              value: {{ include "common.names.fullname" . }}-
          ports:
            - name: http
              containerPort: 25828
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /actuator/health/livenessState
              port: http
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /actuator/health/readinessState
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
            successThreshold: 1
          volumeMounts:
            - name: storage
              mountPath: {{ .Values.common.mountPath }}
            {{- if .Values.tls.mongodb.enabled  }}
            - name: mongodb-ca
              mountPath: /data/certs/mongodb
              readOnly: true
            {{- end }}
      volumes:
        - name: storage
          {{- if .Values.common.config.storage.nfs.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "common.names.fullname" . }}-nfs-pvc
          {{- else if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ if .Values.persistence.existingClaim }}{{ .Values.persistence.existingClaim }}{{- else }}{{ template "common.names.fullname" . }}-storage{{- end }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.tls.mongodb.enabled }}
        - name: mongodb-ca
          secret:
            secretName: {{ .Values.tls.mongodb.existingSecret }}
        {{- end }}
  {{- end }}
