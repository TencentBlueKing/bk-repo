# 匹配以/t/开头的短链跳转请求（公开，无鉴权）
location ~ ^/t/([A-Za-z0-9]+)$ {
	header_filter_by_lua_file 'conf/lua/cors_filter.lua';
	set $service "repository";
	set $path "api/shortlink/$1";
	set $target '';

	access_by_lua_file 'conf/lua/router_srv.lua';

	proxy_set_header HOST $host;
	proxy_set_header X-Real-IP $remote_addr;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto $scheme;
	proxy_set_header X-Forwarded-Host $host;

	# 安全加固：无 auth_request，强制覆盖身份头防止外部伪造
	proxy_set_header X-BKREPO-API-TYPE "api";
	proxy_set_header X-BKREPO-UID "";

	proxy_http_version 1.1;
	proxy_pass http://$target/$path$is_args$args;
}
